<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DiogoSa — Portfolio</title>
  <link rel="stylesheet" href="css/base.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="bg" aria-hidden="true"></canvas>

  <header class="site-header roboto-mono-nav" role="banner">
    <a class="brand" href="/">DS</a>
    <nav aria-label="Main navigation">
      <button class="nav-btn" data-panel="about">ABOUT</button>
      <button class="nav-btn" data-panel="work">WORK</button>
      <button class="nav-btn" data-panel="personal">PERSONAL</button>
      <a class="nav-link" href="/resume.pdf" target="_blank" rel="noopener">RESUME</a>
      <a class="nav-link" href="/blog">JOURNAL</a>
      <a class="nav-link" href="mailto:digasmss@gmail.com">CONTACT</a>
    </nav>
  </header>

  <main id="main" class="main">
    <section id="about" class="panel" aria-labelledby="about-title">
      <h1 id="about-title">About</h1>
      <p class="cormorant-garamond-body">Short punchy intro about you.</p>
      <div class="media-placeholder">[animated demo]</div>
    </section>

    <section id="work" class="panel" aria-labelledby="work-title" hidden>
      <h1 id="work-title">Work</h1>
      <p class="cormorant-garamond-body">One-line summary and links to projects.</p>
      <div class="media-placeholder">[work demo]</div>
    </section>

    <section id="personal" class="panel" aria-labelledby="personal-title" hidden>
      <h1 id="personal-title">Personal</h1>
      <p class="cormorant-garamond-body">Hobbies, side projects.</p>
      <div class="media-placeholder">[personal demo]</div>
    </section>
  </main>

  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/shader.js"></script>
</body>
</html>
